name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy toolkit
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run CLI smoke test
        run: python -m toolkit.cli rca examples/incident.json
